services:
  web:
    build: .
    ports:
      - "5174:5174"
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8001:8000"
    depends_on:
      sql:
        condition: service_healthy
    environment:
      DB_HOST: sql
      DB_PORT: 3306
      DB_NAME: plymouthCrisis
      DB_USER: root
      DB_PASSWORD: root
    volumes:
      - ./app:/app/app
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  sql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: plymouthCrisis
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - sql_data:/var/lib/mysql
      - ./database/database.sql:/docker-entrypoint-initdb.d/01-create-tables.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  sql_data:
