services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-plymouth_crisis_connect}
      POSTGRES_USER: ${POSTGRES_USER:-plymouth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-plymouth_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-plymouth} -d ${POSTGRES_DB:-plymouth_crisis_connect}"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    command: npm run dev

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-plymouth}:${POSTGRES_PASSWORD:-plymouth_dev_password}@database:5432/${POSTGRES_DB:-plymouth_crisis_connect}
      APP_ENV: development
    depends_on:
      database:
        condition: service_healthy
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
